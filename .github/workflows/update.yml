name: Check & Auto Update Authlib Injector

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Latest Release Data
        id: check_version
        run: |
          LATEST_VER=$(curl -s https://api.github.com/repos/yushijinhun/authlib-injector/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          
          if [ -z "$LATEST_VER" ] || [ "$LATEST_VER" = "null" ]; then
            echo "Не удалось получить версию"
            exit 1
          fi
          
          echo "latest_ver=$LATEST_VER" >> $GITHUB_OUTPUT

      - name: Download and Update Files
        run: |
          LATEST_VER="${{ steps.check_version.outputs.latest_ver }}"
          
          # 1. Скачиваем jar
          curl -L -o authlib-injector.jar "https://github.com/yushijinhun/authlib-injector/releases/download/v${LATEST_VER}/authlib-injector-${LATEST_VER}.jar"
          
          SHA256=$(sha256sum authlib-injector.jar | awk '{print $1}')
          FILE_SIZE=$(stat -c%s authlib-injector.jar)
          TIME_NOW=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          
          # 2. Создаем Maven-папку для JAR (как требует Prism Meta)
          MAVEN_PATH="libraries/moe/yushi/authlib-injector/${LATEST_VER}"
          mkdir -p "${MAVEN_PATH}"
          cp authlib-injector.jar "${MAVEN_PATH}/authlib-injector-${LATEST_VER}.jar"
          
          # 3. Создаем папку метаданных компонентов
          mkdir -p moe.yushi.authlibinjector
          
          # 4. Генерируем index.json
          cat <<EOF > moe.yushi.authlibinjector/index.json
          {
            "formatVersion": 1,
            "name": "authlib-injector",
            "uid": "moe.yushi.authlibinjector",
            "versions": [
              {
                "version": "${LATEST_VER}",
                "type": "release",
                "time": "${TIME_NOW}"
              }
            ]
          }
          EOF

          # 5. Генерируем файл версии с правильной структурой и ссылками
          cat <<EOF > "moe.yushi.authlibinjector/${LATEST_VER}.json"
          {
            "formatVersion": 1,
            "name": "authlib-injector",
            "uid": "moe.yushi.authlibinjector",
            "version": "${LATEST_VER}",
            "type": "release",
            "time": "${TIME_NOW}",
            "mainClass": "net.yushi.authlibinjector.Main",
            "requires": [],
            "libraries": [
              {
                "name": "moe.yushi:authlib-injector:${LATEST_VER}",
                "downloads": {
                  "artifact": {
                    "url": "https://adressT-dev.github.io/auth-prism-mirror/libraries/moe/yushi/authlib-injector/${LATEST_VER}/authlib-injector-${LATEST_VER}.jar",
                    "sha256": "${SHA256}",
                    "size": ${FILE_SIZE}
                  }
                }
              }
            ]
          }
          EOF

      - name: Commit and Push if Changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add authlib-injector.jar libraries/ moe.yushi.authlibinjector/
          
          if git diff --staged --quiet; then
            echo "Новых версий нет."
          else
            git commit -m "Auto-update authlib-injector to version ${{ steps.check_version.outputs.latest_ver }}"
            git push
          fi
