name: Check & Auto Update Authlib Injector

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Latest Release Data
        id: check_version
        run: |
          # 1. Запрашиваем последний релиз напрямую через GitHub API разработчика
          LATEST_VER=$(curl -s https://api.github.com/repos/yushijinhun/authlib-injector/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          
          # Проверка на случай ошибки запроса
          if [ -z "$LATEST_VER" ] || [ "$LATEST_VER" = "null" ]; then
            echo "Не удалось получить версию с GitHub API"
            exit 1
          fi
          
          echo "latest_ver=$LATEST_VER" >> $GITHUB_OUTPUT

      - name: Download and Update Files
        run: |
          LATEST_VER="${{ steps.check_version.outputs.latest_ver }}"
          
          # 2. Скачиваем jar файл прямо из релизов GitHub
          curl -L -o authlib-injector.jar "https://github.com/yushijinhun/authlib-injector/releases/download/v${LATEST_VER}/authlib-injector-${LATEST_VER}.jar"
          
          mkdir -p moe.yushi.authlibinjector
          
          # 3. Создаем index.json
          cat <<EOF > moe.yushi.authlibinjector/index.json
          {
            "formatVersion": 1,
            "name": "authlib-injector",
            "uid": "moe.yushi.authlibinjector",
            "versions": [
              {
                "version": "${LATEST_VER}",
                "type": "release",
                "time": "$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
              }
            ]
          }
          EOF

          # 4. Создаем файл конкретной версии (${LATEST_VER}.json)
          cat <<EOF > "moe.yushi.authlibinjector/${LATEST_VER}.json"
          {
            "formatVersion": 1,
            "name": "authlib-injector",
            "uid": "moe.yushi.authlibinjector",
            "version": "${LATEST_VER}",
            "type": "release",
            "time": "$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")",
            "mainClass": "net.yushi.authlibinjector.Main",
            "libraries": [
              {
                "name": "moe.yushi:authlib-injector:${LATEST_VER}",
                "downloads": {
                  "artifact": {
                    "url": "https://raw.githubusercontent.com/${{ github.repository }}/main/authlib-injector.jar"
                  }
                }
              }
            ]
          }
          EOF

      - name: Commit and Push if Changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add authlib-injector.jar moe.yushi.authlibinjector/
          
          if git diff --staged --quiet; then
            echo "Новых версий нет."
          else
            git commit -m "Auto-update authlib-injector to version ${{ steps.check_version.outputs.latest_ver }}"
            git push
          fi
