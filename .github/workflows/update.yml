name: Auto Update Authlib Injector

on:
  schedule:
    - cron: '0 0 * * *' # Проверка каждый день в midnight (00:00 UTC)
  workflow_dispatch: # Позволяет запустить обновление вручную кнопкой

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download latest jar
        run: |
          curl -L -o authlib-injector.jar https://authlib-injector.yushi.moe/artifact/latest.jar

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add authlib-injector.jar
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update authlib-injector" && git push)
