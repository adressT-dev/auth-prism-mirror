name: Check & Auto Update Authlib Injector

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Latest Release Data
        id: check_version
        run: |
          LATEST_VER=$(curl -s https://api.github.com/repos/yushijinhun/authlib-injector/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          if [ -z "$LATEST_VER" ] || [ "$LATEST_VER" = "null" ]; then
            exit 1
          fi
          echo "latest_ver=$LATEST_VER" >> $GITHUB_OUTPUT

      - name: Download and Build Meta
        run: |
          LATEST_VER="${{ steps.check_version.outputs.latest_ver }}"
          
          # Скачиваем jar
          curl -L -o authlib-injector.jar "https://github.com/yushijinhun/authlib-injector/releases/download/v${LATEST_VER}/authlib-injector-${LATEST_VER}.jar"
          
          SHA256=$(sha256sum authlib-injector.jar | awk '{print $1}')
          FILE_SIZE=$(stat -c%s authlib-injector.jar)
          TIME_NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # 1. Корневой index.json (регистрация пакета в лаунчере)
          cat <<EOF > index.json
          {
            "formatVersion": 1,
            "packages": [
              {
                "name": "Authlib Injector",
                "uid": "moe.yushi.authlibinjector"
              }
            ]
          }
          EOF

          # 2. Папка компонента и Maven библиотека
          MAVEN_PATH="libraries/moe/yushi/authlib-injector/${LATEST_VER}"
          mkdir -p "${MAVEN_PATH}"
          cp authlib-injector.jar "${MAVEN_PATH}/authlib-injector-${LATEST_VER}.jar"
          mkdir -p moe.yushi.authlibinjector

          # 3. moe.yushi.authlibinjector/index.json
          cat <<EOF > moe.yushi.authlibinjector/index.json
          {
            "formatVersion": 1,
            "name": "Authlib Injector",
            "uid": "moe.yushi.authlibinjector",
            "versions": [
              {
                "version": "${LATEST_VER}",
                "type": "release",
                "releaseTime": "${TIME_NOW}",
                "sha256": "${SHA256}"
              }
            ]
          }
          EOF

          # 4. moe.yushi.authlibinjector/${LATEST_VER}.json
          cat <<EOF > "moe.yushi.authlibinjector/${LATEST_VER}.json"
          {
            "formatVersion": 1,
            "name": "Authlib Injector",
            "uid": "moe.yushi.authlibinjector",
            "version": "${LATEST_VER}",
            "type": "release",
            "releaseTime": "${TIME_NOW}",
            "requires": [],
            "libraries": [
              {
                "name": "moe.yushi:authlib-injector:${LATEST_VER}",
                "downloads": {
                  "artifact": {
                    "url": "https://adressT-dev.github.io/auth-prism-mirror/libraries/moe/yushi/authlib-injector/${LATEST_VER}/authlib-injector-${LATEST_VER}.jar",
                    "sha256": "${SHA256}",
                    "size": ${FILE_SIZE}
                  }
                }
              }
            ]
          }
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.json authlib-injector.jar libraries/ moe.yushi.authlibinjector/
          
          if ! git diff --staged --quiet; then
            git commit -m "Update meta for version ${{ steps.check_version.outputs.latest_ver }}"
            git push
          fi
